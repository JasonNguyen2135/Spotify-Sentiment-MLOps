apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: 61.3.2 # Hoặc version mới nhất bạn muốn
    chart: kube-prometheus-stack
    helm:
      values: |
        nodeExporter:
          enabled: false
        prometheus-node-exporter:
          enabled: false
        grafana:
          service:
            type: NodePort
            nodePort: 32000
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
