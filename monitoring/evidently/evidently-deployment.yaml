# ==========================================
# 6. EVIDENTLY AI MONITOR
# ==========================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: evidently-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: evidently
  template:
    metadata:
      labels:
        app: evidently
    spec:
      containers:
      - name: evidently
        image: 172.31.87.182/spotify-mlops/evidently-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8085 # Cổng API
        - containerPort: 8086 # Cổng UI
---
apiVersion: v1
kind: Service
metadata:
  name: evidently-service
spec:
  type: NodePort
  selector:
    app: evidently
  ports:
  - name: api
    port: 8085
    targetPort: 8085
  - name: ui
    port: 8086
    targetPort: 8086
    nodePort: 30509 # Mở ra trình duyệt Windows
