apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlflow-pvc
  namespace: mlops-sentiment
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: mlops-sentiment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: mlflow
          image: localhost:30002/mlops/mlflow-server:latest
          imagePullPolicy: IfNotPresent
          # Proxied artifacts: client (host & pod) đọc/ghi artifact QUA server (mlflow-artifacts:/),
          # lưu thật xuống PVC tại /mlflow/artifacts. Bắt buộc cho setup local nhiều client.
          command: ["sh", "-c"]
          args:
            # --gunicorn-opts: serving the VIP DistilBERT model.pth (~268MB) over
            # the proxied-artifacts endpoint exceeds gunicorn's default 30s worker
            # timeout, causing SIGKILL / "Connection broken" mid-download. Raise the
            # timeout and use a couple of workers so loads don't block each other.
            - "mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:////mlflow/mlflow.db --default-artifact-root mlflow-artifacts:/ --artifacts-destination file:///mlflow/artifacts --serve-artifacts --gunicorn-opts '--timeout 300 --workers 2'"
          env:
            - name: BACKEND_STORE_URI
              value: "sqlite:////mlflow/mlflow.db"
            - name: DEFAULT_ARTIFACT_ROOT
              value: "file:///mlflow/artifacts"
          ports:
            - containerPort: 5000
          volumeMounts:
            - name: mlflow-storage
              mountPath: /mlflow
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 2Gi
      volumes:
        - name: mlflow-storage
          persistentVolumeClaim:
            claimName: mlflow-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: mlops-sentiment
spec:
  type: NodePort
  selector:
    app: mlflow
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30050
