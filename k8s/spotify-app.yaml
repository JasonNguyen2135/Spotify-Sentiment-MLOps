# ==========================================
# 5. CRAWLER
# ==========================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crawler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crawler
  template:
    metadata:
      labels:
        app: crawler
    spec:
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: crawler
          image: registry.ntdevopsregistry.io.vn/mlops/crawler:a1a992ff8df48f77a31d579fe4525d4605477288
          imagePullPolicy: IfNotPresent
          env:
            - name: MONGO_URL
              value: "mongodb://mongodb:27017"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
