# ==========================================
# 1. DATABASES (MongoDB & PostgreSQL)
# ==========================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongo-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: mongodb
          image: mongo:latest
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongo-storage
              mountPath: /data/db
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: mongo-storage
          persistentVolumeClaim:
            claimName: mongodb-pvc

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "mlops_auth"
            - name: POSTGRES_USER
              value: "admin"
            - name: POSTGRES_PASSWORD
              value: "admin123"
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
spec:
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432

# ==========================================
# 2. MODEL SERVICE
# ==========================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-service
  namespace: mlops-sentiment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: model-service
  template:
    metadata:
      labels:
        app: model-service
    spec:
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: model-service
          image: registry.ntdevopsregistry.io.vn/mlops/model-service:944d520a7912fb9d7a695c9ad1c59e25a7a075a4
          imagePullPolicy: IfNotPresent
          env:
            - name: MLFLOW_TRACKING_URI
              value: "http://mlflow.ntdevopsmlflow.io.vn"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-creds
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-creds
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_DEFAULT_REGION
              valueFrom:
                secretKeyRef:
                  name: aws-creds
                  key: AWS_DEFAULT_REGION
            - name: RABBITMQ_HOST
              value: "rabbitmq-service.mlops-sentiment.svc.cluster.local"
            - name: RABBITMQ_USER
              value: "mlops"
            - name: RABBITMQ_PASS
              value: "mlops123"
            - name: MODEL_TARGET
              value: "Production"
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: model-service
spec:
  selector:
    app: model-service
  ports:
    - port: 8000
      targetPort: 8000

# ==========================================
# 3. BACKEND
# ==========================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: backend
          image: registry.ntdevopsregistry.io.vn/mlops/backend:fd43db83714953c73c9b3e395b3ea0cf7d3cf46e
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: MODEL_API_URL
              value: "http://model-service:8000"
            - name: MONGO_URL
              value: "mongodb://mongodb:27017"
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT_VAL
              value: "6379"
            - name: DATABASE_URL
              value: "postgresql://admin:admin123@postgres:5432/mlops_auth"
            - name: JWT_SECRET
              value: "super-secret-key-change-me-in-production"
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-secret
                  key: GITHUB_TOKEN
            - name: DAGSHUB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: dagshub-secret
                  key: DAGSHUB_USERNAME
            - name: DAGSHUB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dagshub-secret
                  key: DAGSHUB_PASSWORD
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000

# ==========================================
# 4. FRONTEND
# ==========================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: frontend
          image: registry.ntdevopsregistry.io.vn/mlops/frontend:fd43db83714953c73c9b3e395b3ea0cf7d3cf46e
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: BACKEND_API_URL
              value: "http://backend:8000"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 8501
      targetPort: 3000

# ==========================================
# 5. CRAWLER
# ==========================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crawler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crawler
  template:
    metadata:
      labels:
        app: crawler
    spec:
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: crawler
          image: registry.ntdevopsregistry.io.vn/mlops/crawler:8d336a916599b6f8724d03f5a35e109481cd5cc8
          imagePullPolicy: IfNotPresent
          env:
            - name: MONGO_URL
              value: "mongodb://mongodb:27017"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
