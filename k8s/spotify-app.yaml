# ==========================================
# 3. BACKEND
# ==========================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: backend
          image: registry.ntdevopsregistry.io.vn/mlops/backend:c8f338eb5d9996a3a96739fd0090308a56886444
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: MODEL_API_URL
              value: "http://model-service:8000"
            - name: MONGO_URL
              value: "mongodb://mongodb:27017"
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT_VAL
              value: "6379"
            - name: DATABASE_URL
              value: "postgresql://admin:admin123@postgres:5432/mlops_auth"
            - name: MYSQL_URL
              value: "mysql+pymysql://root:root123@mysql-hitl:3306/hitl_audit"
            - name: JWT_SECRET
              value: "super-secret-key-change-me-in-production"
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-secret
                  key: GITHUB_TOKEN
            - name: DAGSHUB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: dagshub-secret
                  key: DAGSHUB_USERNAME
            - name: DAGSHUB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dagshub-secret
                  key: DAGSHUB_PASSWORD
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000

