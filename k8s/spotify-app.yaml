# ==========================================
# 1. DATABASES (MongoDB & PostgreSQL)
# ==========================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongo-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: mongodb
          image: mongo:latest
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongo-storage
              mountPath: /data/db
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: mongo-storage
          persistentVolumeClaim:
            claimName: mongo-pvc

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "mlops_auth"
            - name: POSTGRES_USER
              value: "admin"
            - name: POSTGRES_PASSWORD
              value: "admin123"
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
spec:
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-hitle-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-hitl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql-hitl
  template:
    metadata:
      labels:
        app: mysql-hitl
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_DATABASE
              value: "hitl_audit"
            - name: MYSQL_ROOT_PASSWORD
              value: "root123"
          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: mysql-storage
          persistentVolumeClaim:
            claimName: mysql-hitle-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-hitl
spec:
  selector:
    app: mysql-hitl
  ports:
    - port: 3306
      targetPort: 3306

# ==========================================
# 2. MODEL SERVICES (5 TIERS)
# ==========================================

# --- BASIC TIER ---
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-service
  namespace: mlops-sentiment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: model-service
  template:
    metadata:
      labels:
        app: model-service
    spec:
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: model-service
          image: registry.ntdevopsregistry.io.vn/mlops/model-service:73ab557a00fb156538d7aecaccc76c62235626fa
          imagePullPolicy: Always
          env:
            - name: MLFLOW_TRACKING_URI
              value: "http://mlflow.ntdevopsmlflow.io.vn"
            - name: MODEL_NAME
              value: "Sentiment_Basic_Model"
            - name: MODEL_TARGET
              value: "Production"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-creds
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-creds
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_DEFAULT_REGION
              valueFrom:
                secretKeyRef:
                  name: aws-creds
                  key: AWS_DEFAULT_REGION
            - name: RABBITMQ_HOST
              value: "rabbitmq-service.mlops-sentiment.svc.cluster.local"
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: model-service
  namespace: mlops-sentiment
spec:
  selector:
    app: model-service
  ports:
    - port: 8000
      targetPort: 8000

