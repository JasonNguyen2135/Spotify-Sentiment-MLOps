# ==========================================
# 6. EVIDENTLY AI MONITOR (WORKSPACE UI)
# ==========================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: evidently-service
  namespace: mlops-sentiment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: evidently
  template:
    metadata:
      labels:
        app: evidently
    spec:
      containers:
      - name: evidently
        # Dùng image Python gốc để chạy thẳng lệnh evidently ui, đảm bảo khớp version
        image: python:3.12-slim
        command: ["/bin/sh", "-c"]
        args: ["pip install evidently==0.4.33 && evidently ui --host 0.0.0.0 --port 8085 --workspace /app/workspace"]
        ports:
        - containerPort: 8085
---
apiVersion: v1
kind: Service
metadata:
  name: evidently-service
  namespace: mlops-sentiment
spec:
  type: NodePort
  selector:
    app: evidently
  ports:
  - name: monitor-port
    port: 8000
    targetPort: 8085
  - name: ui-port
    port: 8085
    targetPort: 8085
