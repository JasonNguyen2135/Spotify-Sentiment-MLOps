# ==========================================
# 6. EVIDENTLY AI MONITOR
# ==========================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: evidently-service
  namespace: mlops-sentiment # Bắt buộc phải có nha Trinh
spec:
  replicas: 1
  selector:
    matchLabels:
      app: evidently
  template:
    metadata:
      labels:
        app: evidently
    spec:
      containers:
      - name: evidently
        # THAY BẰNG IMAGE CHUẨN CỦA HÃNG:
        image: evidently/evidently:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000 # Lưu ý: Image chuẩn thường chạy cổng 8000
---
apiVersion: v1
kind: Service
metadata:
  name: evidently-service
  namespace: mlops-sentiment # Thêm namespace luôn
spec:
  type: ClusterIP
  selector:
    app: evidently
  ports:
  - name: api-ui # Image chuẩn gộp chung API và UI
    port: 8000
    targetPort: 8000
