# ==========================================
# 6. EVIDENTLY AI MONITOR (WORKSPACE UI)
# ==========================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: evidently-service
  namespace: mlops-sentiment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: evidently
  template:
    metadata:
      labels:
        app: evidently
    spec:
      imagePullSecrets:
      - name: harbor-secret
      containers:
      - name: evidently
        # Dùng image từ Harbor để CI có thể update tag
        image: registry.ntdevopsregistry.online/mlops/evidently-service:latest
        command: ["/bin/sh", "-c"]
        args: ["pip install evidently==0.4.33 && evidently ui --host 0.0.0.0 --port 8085 --workspace /app/workspace"]
        ports:
        - containerPort: 8085
---
apiVersion: v1
kind: Service
metadata:
  name: evidently-service
  namespace: mlops-sentiment
spec:
  type: NodePort
  selector:
    app: evidently
  ports:
  - name: monitor-port
    port: 8000
    targetPort: 8085
  - name: ui-port
    port: 8085
    targetPort: 8085
