apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: mlops-sentiment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
      - name: rabbitmq
        image: rabbitmq:3-management
        ports:
        - containerPort: 5672
        - containerPort: 15672
        env: []
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-service
  namespace: mlops-sentiment
spec:
  selector:
    app: rabbitmq
  ports:
    - protocol: TCP
      port: 5672
      targetPort: 5672
