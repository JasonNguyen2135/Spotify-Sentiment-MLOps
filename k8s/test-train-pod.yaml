apiVersion: v1
kind: Pod
metadata:
  name: manual-train-test
  namespace: airflow
spec:
  initContainers:
  - name: git-and-dvc-pull
    image: 172.31.87.182/spotify-mlops/sentiment-trainer:latest
    imagePullPolicy: IfNotPresent
    command: ["/bin/sh", "-c"]
    args:
      - |
        echo "🚀 1. Cloning Source Code..."
        git clone https://davidmoi2135:${GITHUB_TOKEN}@github.com/davidmoi2135/Spotify-Sentiment-MLOps.git /opt/repo
        cd /opt/repo
        
        echo "📡 2. Configuring DVC Auth..."
        # Mặc định dvc dùng remote tên 'origin' trỏ về dagshub
        dvc remote modify origin --project auth token ${DAGSHUB_TOKEN}
        
        echo "📦 3. Pulling Data from DVC..."
        dvc pull model/dataset/spotify_db.raw_reviews.csv.dvc
        
        echo "✅ All set! Code and Data are ready."
    env:
    - name: GITHUB_TOKEN
      valueFrom:
        secretKeyRef:
          name: train-secrets
          key: GITHUB_TOKEN
    - name: DAGSHUB_TOKEN
      valueFrom:
        secretKeyRef:
          name: train-secrets
          key: DAGSHUB_TOKEN
    volumeMounts:
    - name: shared-code
      mountPath: /opt/repo

  containers:
  - name: train-container
    image: 172.31.87.182/spotify-mlops/sentiment-trainer:latest
    imagePullPolicy: IfNotPresent
    workingDir: /opt/repo/model
    command: ["python", "train.py"]
    env:
    - name: DAGSHUB_USERNAME
      value: "davidmoi2135"
    - name: DAGSHUB_TOKEN
      valueFrom:
        secretKeyRef:
          name: train-secrets
          key: DAGSHUB_TOKEN
    volumeMounts:
    - name: shared-code
      mountPath: /opt/repo

  volumes:
  - name: shared-code
    emptyDir: {}
  
  restartPolicy: Never
