apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: spotify-mlops-ingress
  namespace: mlops-sentiment
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: spotify-mlops.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 8501
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 8000
      - path: /model
        pathType: Prefix
        backend:
          service:
            name: model-service
            port:
              number: 8000
      - path: /evidently
        pathType: Prefix
        backend:
          service:
            name: evidently-service
            port:
              number: 8086
