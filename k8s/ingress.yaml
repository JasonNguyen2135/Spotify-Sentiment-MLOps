apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: spotify-mlops-ingress
  namespace: mlops-sentiment
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  rules:
  - host: spotify-mlops.local
    http:
      paths:
      # 1. Bắt các file tĩnh của Evidently (JS, CSS) khi chúng gọi từ root
      - path: /()(index-.*|vendor-.*|manifest\.json|assets/.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: evidently-service
            port:
              number: 8086

      # 2. Định tuyến Backend (/api/xxx -> backend/xxx)
      - path: /api(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: backend
            port:
              number: 8000
      
      # 3. Định tuyến Model Service
      - path: /model(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: model-service
            port:
              number: 8000

      # 4. Định tuyến Evidently UI chính
      - path: /evidently(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: evidently-service
            port:
              number: 8086

      # 5. Định tuyến Frontend (Giữ nguyên path để Next.js xử lý routing nội bộ)
      - path: /()(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: frontend
            port:
              number: 8501
