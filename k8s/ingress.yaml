apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: spotify-mlops-ingress
  namespace: mlops-sentiment
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  rules:
  - host: spotify-mlops.local
    http:
      paths:
      # --- EVIDENTLY ASSETS (Sửa lỗi 404 Iframe) ---
      - path: /(index-.*|vendor-.*|manifest\.json|assets/.*)()(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: evidently-service
            port:
              number: 8086

      # --- BACKEND ---
      - path: /api(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: backend
            port:
              number: 8000
      
      # --- MODEL SERVICE ---
      - path: /model(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: model-service
            port:
              number: 8000

      # --- EVIDENTLY MAIN ---
      - path: /evidently(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: evidently-service
            port:
              number: 8086

      # --- FRONTEND ---
      - path: /()(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: frontend
            port:
              number: 8501
