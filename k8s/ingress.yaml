apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: spotify-mlops-ingress
  namespace: mlops-sentiment
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  rules:
  - host: spotify-mlops.local
    http:
      paths:
      # 1. Định tuyến các thành phần tĩnh của Evidently (Giữ nguyên path)
      - path: /()(static/.*|api/version|api/projects|api/workspace|manifest\.json|favicon\.ico)
        pathType: ImplementationSpecific
        backend:
          service:
            name: evidently-service
            port:
              number: 8086

      # 2. Định tuyến Backend (/api/xxx -> /xxx)
      - path: /api(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: backend
            port:
              number: 8000
      
      # 3. Định tuyến Model Service (/model/xxx -> /xxx)
      - path: /model(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: model-service
            port:
              number: 8000

      # 4. Định tuyến Evidently UI chính
      - path: /evidently(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: evidently-service
            port:
              number: 8086

      # 5. Định tuyến Frontend
      - path: /()(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: frontend
            port:
              number: 8501
