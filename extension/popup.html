<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 320px; padding: 20px; font-family: 'Inter', sans-serif; background: #ffffff; }
    .header { display: flex; items-center; gap: 10px; margin-bottom: 20px; }
    .logo { background: #6366f1; color: white; padding: 8px 12px; border-radius: 10px; font-weight: 900; font-size: 14px; }
    h3 { margin: 0; color: #1e293b; font-size: 16px; font-weight: 800; }
    .card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 16px; padding: 15px; margin-bottom: 20px; }
    p { font-size: 12px; color: #64748b; line-height: 1.5; margin-top: 0; }
    button { width: 100%; padding: 14px; background: #1e293b; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; transition: all 0.2s; display: flex; items-center; justify-content: center; gap: 8px; }
    button:hover { background: #0f172a; transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    button:disabled { background: #cbd5e1; cursor: not-allowed; }
    .status { margin-top: 15px; font-size: 10px; color: #94a3b8; font-weight: 800; text-transform: uppercase; text-align: center; }
    .badge { display: inline-block; padding: 2px 8px; background: #e0e7ff; color: #4338ca; border-radius: 6px; font-size: 10px; font-weight: 700; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">S</div>
    <h3>Harvester AI</h3>
  </div>
  
  <div class="card">
    <div class="badge" id="platformBadge">Detecting...</div>
    <p>Open a product review page on Google Play or App Store to start harvesting.</p>
    <button id="harvestBtn">Harvest & Export CSV</button>
  </div>

  <div id="status" class="status">Ready to harvest</div>

  <script src="popup.js"></script>
</body>
</html>
