<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 300px; padding: 20px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    h3 { margin-top: 0; color: #1e293b; font-weight: 800; }
    button { width: 100%; padding: 12px; background: #6366f1; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; transition: opacity 0.2s; }
    button:hover { opacity: 0.9; }
    input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; outline: none; }
    input:focus { border-color: #6366f1; ring: 2px solid #6366f1; }
    .status { margin-top: 15px; font-size: 11px; color: #94a3b8; font-weight: bold; text-transform: uppercase; letter-spacing: 0.05em; }
    .logo { color: #6366f1; font-weight: 900; }
  </style>
</head>
<body>
  <h3><span class="logo">Sentiment</span>AI</h3>
  <p style="font-size: 12px; color: #64748b; margin-bottom: 20px;">Scrape comments from the current page and analyze instantly.</p>
  <input type="text" id="projectKey" placeholder="Project ID (from Dashboard)">
  <button id="scrapeBtn">Analyze Page Content</button>
  <div id="status" class="status"></div>
  <script src="popup.js"></script>
</body>
</html>
