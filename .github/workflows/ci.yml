name: Spotify Sentiment MLOps CI/CD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-changes:
    runs-on: self-hosted
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      model: ${{ steps.filter.outputs.model }}
      crawler: ${{ steps.filter.outputs.crawler }}
    steps:
      - uses: actions/checkout@v3
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            backend: ['backend/**']
            frontend: ['frontend/**']
            model: ['model/**']
            crawler: ['crawler/**']

  build-and-gitops:
    needs: check-changes
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # BUILD SERVICES (Chỉ build nếu có thay đổi)
      - name: Build Backend
        if: needs.check-changes.outputs.backend == 'true'
        run: docker build -t 172.31.87.182/spotify-mlops/backend:${{ github.sha }} ./backend

      - name: Build Frontend
        if: needs.check-changes.outputs.frontend == 'true'
        run: docker build -t 172.31.87.182/spotify-mlops/frontend:${{ github.sha }} ./frontend

      - name: Build Model Service
        if: needs.check-changes.outputs.model == 'true'
        run: docker build -t 172.31.87.182/spotify-mlops/model-service:${{ github.sha }} ./model

      - name: Build Crawler
        if: needs.check-changes.outputs.crawler == 'true'
        run: docker build -t 172.31.87.182/spotify-mlops/crawler:${{ github.sha }} ./crawler

      # UPDATE MANIFEST (Chỉ cập nhật tag cho những gì vừa build)
      - name: Update Manifest and Push
        run: |
          git config --global user.email "ci-bot@example.com"
          git config --global user.name "CI Bot"
          TAG="${{ github.sha }}"

          git checkout -b deploy || git checkout deploy
          
          # Chỉ dùng sed nếu service đó được build
          if [ "${{ needs.check-changes.outputs.backend }}" == "true" ]; then
            sed -i "s|image: 172.31.87.182/spotify-mlops/backend:.*|image: 172.31.87.182/spotify-mlops/backend:$TAG|g" k8s/spotify-app.yaml
          fi
          if [ "${{ needs.check-changes.outputs.frontend }}" == "true" ]; then
            sed -i "s|image: 172.31.87.182/spotify-mlops/frontend:.*|image: 172.31.87.182/spotify-mlops/frontend:$TAG|g" k8s/spotify-app.yaml
          fi
          if [ "${{ needs.check-changes.outputs.model }}" == "true" ]; then
            sed -i "s|image: 172.31.87.182/spotify-mlops/model-service:.*|image: 172.31.87.182/spotify-mlops/model-service:$TAG|g" k8s/spotify-app.yaml
          fi
          if [ "${{ needs.check-changes.outputs.crawler }}" == "true" ]; then
            sed -i "s|image: 172.31.87.182/spotify-mlops/crawler:.*|image: 172.31.87.182/spotify-mlops/crawler:$TAG|g" k8s/spotify-app.yaml
          fi

          git add k8s/spotify-app.yaml
          git commit -m "deploy: update changed images to $TAG [skip ci]" || echo "No changes"
          git push origin deploy --force
