name: Spotify Sentiment MLOps CI/CD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-changes:
    runs-on: self-hosted
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      model: ${{ steps.filter.outputs.model }}
      crawler: ${{ steps.filter.outputs.crawler }}
      evidently: ${{ steps.filter.outputs.evidently }}
    steps:
      - uses: actions/checkout@v3
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            backend: ['backend/**']
            frontend: ['frontend/**']
            model: ['model/**']
            crawler: ['crawler/**']
            evidently: ['monitoring/evidently/**']

  build-and-gitops:
    needs: check-changes
    runs-on: self-hosted
    steps:
      - name: Checkout main code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 1. BUILD SERVICES (Retry 5 times)
      - name: Build Backend
        if: needs.check-changes.outputs.backend == 'true'
        run: |
          for i in {1..5}; do docker build -t 172.31.87.182/spotify-mlops/backend:${{ github.sha }} ./backend && break || sleep 15; done

      - name: Build Frontend
        if: needs.check-changes.outputs.frontend == 'true'
        run: |
          for i in {1..5}; do docker build -t 172.31.87.182/spotify-mlops/frontend:${{ github.sha }} ./frontend && break || sleep 15; done

      - name: Build Model Service
        if: needs.check-changes.outputs.model == 'true'
        run: |
          for i in {1..5}; do docker build -t 172.31.87.182/spotify-mlops/model-service:${{ github.sha }} ./model && break || sleep 15; done

      - name: Build Crawler
        if: needs.check-changes.outputs.crawler == 'true'
        run: |
          for i in {1..5}; do docker build -t 172.31.87.182/spotify-mlops/crawler:${{ github.sha }} ./crawler && break || sleep 15; done

      - name: Build Evidently
        if: needs.check-changes.outputs.evidently == 'true'
        run: |
          for i in {1..5}; do docker build -t 172.31.87.182/spotify-mlops/evidently-service:${{ github.sha }} ./monitoring/evidently && break || sleep 15; done

      # 2. CẬP NHẬT GITOPS (Surgical Precise Update)
      - name: Update Manifest
        run: |
          git config --global user.email "ci-bot@example.com"
          git config --global user.name "CI Bot"
          TAG="${{ github.sha }}"

          # Tạm lưu file hạ tầng từ main
          mkdir -p /tmp/k8s-sync
          cp k8s/ingress.yaml k8s/hpa.yaml /tmp/k8s-sync/ || true

          # Sang nhánh deploy
          git fetch origin deploy
          git checkout deploy || git checkout -b deploy

          # Cập nhật hạ tầng
          cp /tmp/k8s-sync/* k8s/ || true
          
          # Sửa tag cho những gì vừa build (Giữ nguyên SHA cũ của những cái khác)
          if [ "${{ needs.check-changes.outputs.backend }}" == "true" ]; then
            sed -i "s|image: 172.31.87.182/spotify-mlops/backend:.*|image: 172.31.87.182/spotify-mlops/backend:$TAG|g" k8s/spotify-app.yaml
          fi
          if [ "${{ needs.check-changes.outputs.frontend }}" == "true" ]; then
            sed -i "s|image: 172.31.87.182/spotify-mlops/frontend:.*|image: 172.31.87.182/spotify-mlops/frontend:$TAG|g" k8s/spotify-app.yaml
          fi
          if [ "${{ needs.check-changes.outputs.model }}" == "true" ]; then
            sed -i "s|image: 172.31.87.182/spotify-mlops/model-service:.*|image: 172.31.87.182/spotify-mlops/model-service:$TAG|g" k8s/spotify-app.yaml
          fi
          if [ "${{ needs.check-changes.outputs.crawler }}" == "true" ]; then
            sed -i "s|image: 172.31.87.182/spotify-mlops/crawler:.*|image: 172.31.87.182/spotify-mlops/crawler:$TAG|g" k8s/spotify-app.yaml
          fi
          if [ "${{ needs.check-changes.outputs.evidently }}" == "true" ]; then
            sed -i "s|image: 172.31.87.182/spotify-mlops/evidently-service:.*|image: 172.31.87.182/spotify-mlops/evidently-service:$TAG|g" k8s/evidently-deployment.yaml
          fi

          git add k8s/
          git commit -m "deploy: precise surgical sync from $TAG [skip ci]" || echo "No changes"
          git push origin HEAD:deploy --force
