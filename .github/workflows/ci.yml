name: Spotify Sentiment MLOps CI/CD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-changes:
    runs-on: self-hosted
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      crawler: ${{ steps.filter.outputs.crawler }}
      monitoring_consumer: ${{ steps.filter.outputs.monitoring_consumer }}
      trainer_logic: ${{ steps.filter.outputs.trainer_logic }}
    steps:
      - uses: actions/checkout@v3
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            backend: ['backend/**']
            frontend: ['frontend/**']
            crawler: ['crawler/**']
            monitoring_consumer: ['model/monitoring/**']
            trainer_logic: ['model/train.py', 'model/Dockerfile.train', 'dags/spotify_training_dag.py']

  build-and-gitops:
    needs: check-changes
    runs-on: self-hosted
    steps:
      - name: Checkout main code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 1. LOGIN & BUILD SERVICES (Retry 5 times)
      - name: Login to Harbor
        run: echo "${{ secrets.HARBOR_PASSWORD }}" | docker login registry.ntdevopsregistry.io.vn -u ${{ secrets.HARBOR_USERNAME }} --password-stdin

      - name: Build and Push Backend
        if: needs.check-changes.outputs.backend == 'true'
        run: |
          for i in {1..5}; do 
            docker build -t registry.ntdevopsregistry.io.vn/mlops/backend:${{ github.sha }} ./backend && \
            docker push registry.ntdevopsregistry.io.vn/mlops/backend:${{ github.sha }} && break || sleep 15
          done

      - name: Build and Push Frontend
        if: needs.check-changes.outputs.frontend == 'true'
        run: |
          for i in {1..5}; do 
            docker build -t registry.ntdevopsregistry.io.vn/mlops/frontend:${{ github.sha }} ./frontend && \
            docker push registry.ntdevopsregistry.io.vn/mlops/frontend:${{ github.sha }} && break || sleep 15
          done

      # BUILD TRAINER IMAGE
      - name: Build and Push Sentiment Trainer
        if: needs.check-changes.outputs.trainer_logic == 'true'
        run: |
          for i in {1..5}; do 
            docker build -t registry.ntdevopsregistry.io.vn/mlops/sentiment-trainer:latest -f model/Dockerfile.train ./model && \
            docker push registry.ntdevopsregistry.io.vn/mlops/sentiment-trainer:latest && break || sleep 15
          done

      - name: Build and Push Crawler
        if: needs.check-changes.outputs.crawler == 'true'
        run: |
          for i in {1..5}; do 
            docker build -t registry.ntdevopsregistry.io.vn/mlops/crawler:${{ github.sha }} ./crawler && \
            docker push registry.ntdevopsregistry.io.vn/mlops/crawler:${{ github.sha }} && break || sleep 15
          done

      - name: Build and Push Monitoring Consumer
        if: needs.check-changes.outputs.monitoring_consumer == 'true'
        run: |
          for i in {1..5}; do 
            docker build -t registry.ntdevopsregistry.io.vn/mlops/spotify-monitoring:${{ github.sha }} -f model/monitoring/Dockerfile ./model && \
            docker push registry.ntdevopsregistry.io.vn/mlops/spotify-monitoring:${{ github.sha }} && break || sleep 15
          done

      # 2. TRIỂN KHAI DAG VÀ KÍCH HOẠT (Dùng kubectl trực tiếp)
      - name: Deploy DAG file to K8s
        if: needs.check-changes.outputs.trainer_logic == 'true'
        run: |
          echo "Finding Scheduler and Dag-Processor pods..."
          SCHEDULER_POD=$(kubectl get pods -n airflow -l component=scheduler -o jsonpath='{.items[0].metadata.name}')
          PROCESSOR_POD=$(kubectl get pods -n airflow -l component=dag-processor -o jsonpath='{.items[0].metadata.name}')
          
          echo "Copying spotify_training_dag.py to Airflow system..."
          kubectl cp dags/spotify_training_dag.py airflow/$SCHEDULER_POD:/opt/airflow/dags/ -c scheduler
          kubectl cp dags/spotify_training_dag.py airflow/$PROCESSOR_POD:/opt/airflow/dags/ -c dag-processor
          sleep 5

      - name: Trigger Training Pod on K8s
        if: needs.check-changes.outputs.trainer_logic == 'true'
        run: |
          echo "Triggering DAG run..."
          kubectl exec -n airflow statefulset/airflow-scheduler -c scheduler -- airflow dags trigger spotify_sentiment_train_k8s_native -c "{\"commit_sha\": \"${{ github.sha }}\", \"message\": \"Auto-triggered by CI logic change\"}"
          echo "MLOps training flow started successfully"

      # 3. CẬP NHẬT GITOPS (Surgical Precise Update with Tag Preservation)
      - name: Update Manifest
        run: |
          git config --global user.email "ci-bot@example.com"
          git config --global user.name "CI Bot"
          TAG="${{ github.sha }}"

          # Bước A: Lưu lại các file YAML từ nhánh main (chứa cấu hình infra mới nhất)
          mkdir -p /tmp/k8s-main
          cp k8s/*.yaml /tmp/k8s-main/

          # Bước B: Sang nhánh deploy để lấy các Tag đang chạy ổn định
          git fetch origin deploy
          git checkout deploy || git checkout -b deploy
          
          # Hàm lấy tag hiện tại từ file trên nhánh deploy (xử lý cả .online và .io.vn)
          get_tag() {
            local service=$1
            local file=$2
            grep -oP "image: registry.ntdevopsregistry\.(online\|io\.vn)/mlops/$service:\K[^\s#]*" "$file" | head -1 || echo "v1.0.0"
          }

          OLD_BACKEND_TAG=$(get_tag "backend" "k8s/spotify-app.yaml")
          OLD_FRONTEND_TAG=$(get_tag "frontend" "k8s/spotify-app.yaml")
          OLD_MODEL_TAG=$(get_tag "model-service" "k8s/spotify-app.yaml")
          OLD_CRAWLER_TAG=$(get_tag "crawler" "k8s/spotify-app.yaml")
          OLD_MONITORING_TAG=$(get_tag "spotify-monitoring" "k8s/monitoring-service.yaml")

          echo "Detected Tags: Backend=$OLD_BACKEND_TAG, Frontend=$OLD_FRONTEND_TAG, Model=$OLD_MODEL_TAG, Crawler=$OLD_CRAWLER_TAG"

          # Bước C: Ghi đè cấu hình infra từ main vào deploy
          cp /tmp/k8s-main/* k8s/
          
          # Bước D: Cập nhật Tag (Sử dụng regex chính xác để tránh hỏng YAML)
          update_image() {
            local service=$1
            local new_tag=$2
            local old_tag=$3
            local file=$4
            local changed=$5
            
            local target_tag=$old_tag
            if [ "$changed" == "true" ]; then
              target_tag=$new_tag
            fi
            
            echo "Setting $service tag to: $target_tag"
            sed -i "s|image: registry.ntdevopsregistry.io.vn/mlops/$service:.*|image: registry.ntdevopsregistry.io.vn/mlops/$service:$target_tag|g" "$file"
          }

          update_image "backend" "$TAG" "$OLD_BACKEND_TAG" "k8s/spotify-app.yaml" "${{ needs.check-changes.outputs.backend }}"
          update_image "frontend" "$TAG" "$OLD_FRONTEND_TAG" "k8s/spotify-app.yaml" "${{ needs.check-changes.outputs.frontend }}"
          update_image "crawler" "$TAG" "$OLD_CRAWLER_TAG" "k8s/spotify-app.yaml" "${{ needs.check-changes.outputs.crawler }}"
          update_image "spotify-monitoring" "$TAG" "$OLD_MONITORING_TAG" "k8s/monitoring-service.yaml" "${{ needs.check-changes.outputs.monitoring_consumer }}"

          # Giữ nguyên tag của model-service từ nhánh deploy
          if [ -n "$OLD_MODEL_TAG" ]; then
            sed -i "s|image: registry.ntdevopsregistry.io.vn/mlops/model-service:.*|image: registry.ntdevopsregistry.io.vn/mlops/model-service:$OLD_MODEL_TAG|g" k8s/spotify-app.yaml
          fi

          git add k8s/
          git commit -m "deploy: update manifests with tag preservation [skip ci]" || echo "No changes"
          git push origin HEAD:deploy --force

      # 4. NOTIFY SLACK
      - name: Slack Notification
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}
          SLACK_MESSAGE: "CI/CD Pipeline for Spotify MLOps: ${{ job.status }}"
          SLACK_TITLE: "Build & Deploy Status"
