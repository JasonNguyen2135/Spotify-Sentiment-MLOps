name: Spotify Sentiment MLOps CI/CD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-changes:
    runs-on: self-hosted
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      model: ${{ steps.filter.outputs.model }}
      crawler: ${{ steps.filter.outputs.crawler }}
    steps:
      - uses: actions/checkout@v3
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            backend: ['backend/**']
            frontend: ['frontend/**']
            model: ['model/**']
            crawler: ['crawler/**']

  build-and-gitops:
    needs: check-changes
    runs-on: self-hosted
    steps:
      - name: Checkout main code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 1. BUILD SERVICES
      - name: Build Backend
        if: needs.check-changes.outputs.backend == 'true'
        run: |
          for i in {1..5}; do
            docker build -t 172.31.87.182/spotify-mlops/backend:${{ github.sha }} ./backend && break || sleep 15
          done

      - name: Build Frontend
        if: needs.check-changes.outputs.frontend == 'true'
        run: |
          for i in {1..5}; do
            docker build -t 172.31.87.182/spotify-mlops/frontend:${{ github.sha }} ./frontend && break || sleep 15
          done

      - name: Build Model Service
        if: needs.check-changes.outputs.model == 'true'
        run: |
          for i in {1..5}; do
            docker build -t 172.31.87.182/spotify-mlops/model-service:${{ github.sha }} ./model && break || sleep 15
          done

      - name: Build Crawler
        if: needs.check-changes.outputs.crawler == 'true'
        run: |
          for i in {1..5}; do
            docker build -t 172.31.87.182/spotify-mlops/crawler:${{ github.sha }} ./crawler && break || sleep 15
          done

      # 2. CẬP NHẬT GITOPS (Đồng bộ TOÀN BỘ thư mục k8s)
      - name: Update Manifest
        run: |
          git config --global user.email "ci-bot@example.com"
          git config --global user.name "CI Bot"
          
          # Lưu lại mã SHA và nội dung thư mục k8s hiện tại
          TAG="${{ github.sha }}"
          mkdir -p /tmp/k8s-new
          cp -r k8s/* /tmp/k8s-new/

          # Chuyển sang nhánh deploy
          git fetch origin deploy
          git checkout deploy || git checkout -b deploy

          # Copy đè toàn bộ file manifest mới vào nhánh deploy
          cp -r /tmp/k8s-new/* k8s/
          
          # Cập nhật tag image cho những service vừa build
          if [ "${{ needs.check-changes.outputs.backend }}" == "true" ]; then
            sed -i "s|image: 172.31.87.182/spotify-mlops/backend:.*|image: 172.31.87.182/spotify-mlops/backend:$TAG|g" k8s/spotify-app.yaml
          fi
          if [ "${{ needs.check-changes.outputs.frontend }}" == "true" ]; then
            sed -i "s|image: 172.31.87.182/spotify-mlops/frontend:.*|image: 172.31.87.182/spotify-mlops/frontend:$TAG|g" k8s/spotify-app.yaml
          fi
          if [ "${{ needs.check-changes.outputs.model }}" == "true" ]; then
            sed -i "s|image: 172.31.87.182/spotify-mlops/model-service:.*|image: 172.31.87.182/spotify-mlops/model-service:$TAG|g" k8s/spotify-app.yaml
          fi
          if [ "${{ needs.check-changes.outputs.crawler }}" == "true" ]; then
            sed -i "s|image: 172.31.87.182/spotify-mlops/crawler:.*|image: 172.31.87.182/spotify-mlops/crawler:$TAG|g" k8s/spotify-app.yaml
          fi

          # Push toàn bộ thư mục k8s lên nhánh deploy
          git add k8s/
          git commit -m "deploy: sync all manifests from commit $TAG [skip ci]" || echo "No changes"
          git push origin deploy --force
