name: Spotify Sentiment MLOps CI/CD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-changes:
    runs-on: self-hosted
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      model: ${{ steps.filter.outputs.model }}
      crawler: ${{ steps.filter.outputs.crawler }}
      evidently: ${{ steps.filter.outputs.evidently }}
      monitoring_consumer: ${{ steps.filter.outputs.monitoring_consumer }}
    steps:
      - uses: actions/checkout@v3
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            backend: ['backend/**']
            frontend: ['frontend/**']
            model: ['model/**']
            crawler: ['crawler/**']
            evidently: ['monitoring/evidently/**']
            monitoring_consumer: ['model/monitoring/**']

  build-and-gitops:
    needs: check-changes
    runs-on: self-hosted
    steps:
      - name: Checkout main code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 1. LOGIN & BUILD SERVICES (Retry 5 times)
      - name: Login to Harbor
        run: echo "${{ secrets.HARBOR_PASSWORD }}" | docker login registry.ntdevopsregistry.online -u ${{ secrets.HARBOR_USERNAME }} --password-stdin

      - name: Build and Push Backend
        if: needs.check-changes.outputs.backend == 'true'
        run: |
          for i in {1..5}; do 
            docker build -t registry.ntdevopsregistry.online/mlops/backend:${{ github.sha }} ./backend && \
            docker push registry.ntdevopsregistry.online/mlops/backend:${{ github.sha }} && break || sleep 15
          done

      - name: Build and Push Frontend
        if: needs.check-changes.outputs.frontend == 'true'
        run: |
          for i in {1..5}; do 
            docker build -t registry.ntdevopsregistry.online/mlops/frontend:${{ github.sha }} ./frontend && \
            docker push registry.ntdevopsregistry.online/mlops/frontend:${{ github.sha }} && break || sleep 15
          done

      - name: Build and Push Model Service
        if: needs.check-changes.outputs.model == 'true'
        run: |
          for i in {1..5}; do 
            docker build -t registry.ntdevopsregistry.online/mlops/model-service:${{ github.sha }} ./model && \
            docker push registry.ntdevopsregistry.online/mlops/model-service:${{ github.sha }} && break || sleep 15
          done

      # BUILD TRAINER IMAGE (Mới thêm)
      - name: Build and Push Sentiment Trainer
        if: needs.check-changes.outputs.model == 'true'
        run: |
          for i in {1..5}; do 
            docker build -t registry.ntdevopsregistry.online/mlops/sentiment-trainer:latest -f model/Dockerfile.train ./model && \
            docker push registry.ntdevopsregistry.online/mlops/sentiment-trainer:latest && break || sleep 15
          done

      - name: Build and Push Crawler
        if: needs.check-changes.outputs.crawler == 'true'
        run: |
          for i in {1..5}; do 
            docker build -t registry.ntdevopsregistry.online/mlops/crawler:${{ github.sha }} ./crawler && \
            docker push registry.ntdevopsregistry.online/mlops/crawler:${{ github.sha }} && break || sleep 15
          done

      - name: Build and Push Evidently
        if: needs.check-changes.outputs.evidently == 'true'
        run: |
          for i in {1..5}; do 
            docker build -t registry.ntdevopsregistry.online/mlops/evidently-service:${{ github.sha }} ./monitoring/evidently && \
            docker push registry.ntdevopsregistry.online/mlops/evidently-service:${{ github.sha }} && break || sleep 15
          done

      - name: Build and Push Monitoring Consumer
        if: needs.check-changes.outputs.monitoring_consumer == 'true'
        run: |
          for i in {1..5}; do 
            docker build -t registry.ntdevopsregistry.online/mlops/spotify-monitoring:${{ github.sha }} ./model/monitoring && \
            docker push registry.ntdevopsregistry.online/mlops/spotify-monitoring:${{ github.sha }} && break || sleep 15
          done

      # 2. CẬP NHẬT GITOPS (Surgical Precise Update)
      - name: Update Manifest
        run: |
          git config --global user.email "ci-bot@example.com"
          git config --global user.name "CI Bot"
          TAG="${{ github.sha }}"

          mkdir -p /tmp/k8s-sync
          cp k8s/*.yaml /tmp/k8s-sync/ || true

          git fetch origin deploy
          git checkout deploy || git checkout -b deploy
          cp /tmp/k8s-sync/* k8s/ || true
          
          if [ "${{ needs.check-changes.outputs.backend }}" == "true" ]; then
            sed -i "s|image: registry.ntdevopsregistry.online/mlops/backend:.*|image: registry.ntdevopsregistry.online/mlops/backend:$TAG|g" k8s/spotify-app.yaml
          fi
          if [ "${{ needs.check-changes.outputs.frontend }}" == "true" ]; then
            sed -i "s|image: registry.ntdevopsregistry.online/mlops/frontend:.*|image: registry.ntdevopsregistry.online/mlops/frontend:$TAG|g" k8s/spotify-app.yaml
          fi
          if [ "${{ needs.check-changes.outputs.model }}" == "true" ]; then
            sed -i "s|image: registry.ntdevopsregistry.online/mlops/model-service:.*|image: registry.ntdevopsregistry.online/mlops/model-service:$TAG|g" k8s/spotify-app.yaml
          fi
          if [ "${{ needs.check-changes.outputs.crawler }}" == "true" ]; then
            sed -i "s|image: registry.ntdevopsregistry.online/mlops/crawler:.*|image: registry.ntdevopsregistry.online/mlops/crawler:$TAG|g" k8s/spotify-app.yaml
          fi
          if [ "${{ needs.check-changes.outputs.evidently }}" == "true" ]; then
            sed -i "s|image: registry.ntdevopsregistry.online/mlops/evidently-service:.*|image: registry.ntdevopsregistry.online/mlops/evidently-service:$TAG|g" k8s/evidently-deployment.yaml
          fi
          if [ "${{ needs.check-changes.outputs.monitoring_consumer }}" == "true" ]; then
            sed -i "s|image: registry.ntdevopsregistry.online/mlops/spotify-monitoring:.*|image: registry.ntdevopsregistry.online/mlops/spotify-monitoring:$TAG|g" k8s/monitoring-service.yaml
          fi

          git add k8s/
          git commit -m "deploy: update manifests and trainer image [skip ci]" || echo "No changes"
          git push origin HEAD:deploy --force
