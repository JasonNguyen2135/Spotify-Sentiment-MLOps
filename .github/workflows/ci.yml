name: Spotify Sentiment MLOps CI/CD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-changes:
    runs-on: self-hosted
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      model: ${{ steps.filter.outputs.model }}
      crawler: ${{ steps.filter.outputs.crawler }}
    steps:
      - uses: actions/checkout@v3
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            backend: ['backend/**']
            frontend: ['frontend/**']
            model: ['model/**']
            crawler: ['crawler/**']

  build-and-gitops:
    needs: check-changes
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # Chỉ build những gì thay đổi để tiết kiệm thời gian
      - name: Build Services
        run: |
          if [ "${{ needs.check-changes.outputs.backend }}" == "true" ]; then
            docker build -t 172.31.87.182/spotify-mlops/backend:${{ github.sha }} ./backend
          fi
          if [ "${{ needs.check-changes.outputs.frontend }}" == "true" ]; then
            docker build -t 172.31.87.182/spotify-mlops/frontend:${{ github.sha }} ./frontend
          fi
          if [ "${{ needs.check-changes.outputs.model }}" == "true" ]; then
            docker build -t 172.31.87.182/spotify-mlops/model-service:${{ github.sha }} ./model
          fi
          if [ "${{ needs.check-changes.outputs.crawler }}" == "true" ]; then
            docker build -t 172.31.87.182/spotify-mlops/crawler:${{ github.sha }} ./crawler
          fi

      - name: Update Manifest and Push to Deploy Branch
        run: |
          git config --global user.email "ci-bot@example.com"
          git config --global user.name "CI Bot"
          
          # Luôn lấy SHA hiện tại cho các image (vì chúng ta build local)
          # Nếu service không build lần này, nó sẽ dùng image đã build từ commit trước đó (vẫn tồn tại ở local)
          TAG="${{ github.sha }}"

          git checkout -b deploy || git checkout deploy
          
          # Cập nhật TẤT CẢ các tag image sang mã SHA mới nhất
          sed -i "s|image: 172.31.87.182/spotify-mlops/backend:.*|image: 172.31.87.182/spotify-mlops/backend:$TAG|g" k8s/spotify-app.yaml
          sed -i "s|image: 172.31.87.182/spotify-mlops/frontend:.*|image: 172.31.87.182/spotify-mlops/frontend:$TAG|g" k8s/spotify-app.yaml
          sed -i "s|image: 172.31.87.182/spotify-mlops/model-service:.*|image: 172.31.87.182/spotify-mlops/model-service:$TAG|g" k8s/spotify-app.yaml
          sed -i "s|image: 172.31.87.182/spotify-mlops/crawler:.*|image: 172.31.87.182/spotify-mlops/crawler:$TAG|g" k8s/spotify-app.yaml

          git add k8s/spotify-app.yaml
          git commit -m "deploy: update all images to $TAG [skip ci]" || echo "No changes"
          git push origin deploy --force
