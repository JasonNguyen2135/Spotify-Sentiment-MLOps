name: Spotify Sentiment MLOps CI/CD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-changes:
    runs-on: self-hosted
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      model: ${{ steps.filter.outputs.model }}
      crawler: ${{ steps.filter.outputs.crawler }}
      monitoring_consumer: ${{ steps.filter.outputs.monitoring_consumer }}
    steps:
      - uses: actions/checkout@v3
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            backend: ['backend/**']
            frontend: ['frontend/**']
            model: ['model/**']
            crawler: ['crawler/**']
            monitoring_consumer: ['model/monitoring/**']

  build-and-gitops:
    needs: check-changes
    runs-on: self-hosted
    steps:
      - name: Checkout main code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 1. LOGIN & BUILD SERVICES (Retry 5 times)
      - name: Login to Harbor
        run: echo "${{ secrets.HARBOR_PASSWORD }}" | docker login registry.ntdevopsregistry.online -u ${{ secrets.HARBOR_USERNAME }} --password-stdin

      - name: Build and Push Backend
        if: needs.check-changes.outputs.backend == 'true'
        run: |
          for i in {1..5}; do 
            docker build -t registry.ntdevopsregistry.online/mlops/backend:${{ github.sha }} ./backend && \
            docker push registry.ntdevopsregistry.online/mlops/backend:${{ github.sha }} && break || sleep 15
          done

      - name: Build and Push Frontend
        if: needs.check-changes.outputs.frontend == 'true'
        run: |
          for i in {1..5}; do 
            docker build -t registry.ntdevopsregistry.online/mlops/frontend:${{ github.sha }} ./frontend && \
            docker push registry.ntdevopsregistry.online/mlops/frontend:${{ github.sha }} && break || sleep 15
          done

      - name: Build and Push Model Service
        if: needs.check-changes.outputs.model == 'true'
        run: |
          for i in {1..5}; do 
            docker build -t registry.ntdevopsregistry.online/mlops/model-service:${{ github.sha }} ./model && \
            docker push registry.ntdevopsregistry.online/mlops/model-service:${{ github.sha }} && break || sleep 15
          done

      # BUILD TRAINER IMAGE (Mới thêm)
      - name: Build and Push Sentiment Trainer
        if: needs.check-changes.outputs.model == 'true'
        run: |
          for i in {1..5}; do 
            docker build -t registry.ntdevopsregistry.online/mlops/sentiment-trainer:latest -f model/Dockerfile.train ./model && \
            docker push registry.ntdevopsregistry.online/mlops/sentiment-trainer:latest && break || sleep 15
          done

      - name: Build and Push Crawler
        if: needs.check-changes.outputs.crawler == 'true'
        run: |
          for i in {1..5}; do 
            docker build -t registry.ntdevopsregistry.online/mlops/crawler:${{ github.sha }} ./crawler && \
            docker push registry.ntdevopsregistry.online/mlops/crawler:${{ github.sha }} && break || sleep 15
          done

      - name: Build and Push Monitoring Consumer
        if: needs.check-changes.outputs.monitoring_consumer == 'true'
        run: |
          for i in {1..5}; do 
            docker build -t registry.ntdevopsregistry.online/mlops/spotify-monitoring:${{ github.sha }} ./model/monitoring && \
            docker push registry.ntdevopsregistry.online/mlops/spotify-monitoring:${{ github.sha }} && break || sleep 15
          done

      # 2. CẬP NHẬT GITOPS (Surgical Precise Update with Tag Preservation)
      - name: Update Manifest
        run: |
          git config --global user.email "ci-bot@example.com"
          git config --global user.name "CI Bot"
          TAG="${{ github.sha }}"

          # Bước A: Lưu lại các file YAML từ nhánh main (chứa cấu hình infra mới nhất)
          mkdir -p /tmp/k8s-main
          cp k8s/*.yaml /tmp/k8s-main/

          # Bước B: Sang nhánh deploy để lấy các Tag đang chạy ổn định
          git fetch origin deploy
          git checkout deploy || git checkout -b deploy
          
          # Hàm lấy tag hiện tại từ file trên nhánh deploy
          get_tag() {
            local service=$1
            local file=$2
            grep -oP "image: registry.ntdevopsregistry.online/mlops/$service:\K.*" "$file" | head -1 || echo "latest"
          }

          OLD_BACKEND_TAG=$(get_tag "backend" "k8s/spotify-app.yaml")
          OLD_FRONTEND_TAG=$(get_tag "frontend" "k8s/spotify-app.yaml")
          OLD_MODEL_TAG=$(get_tag "model-service" "k8s/spotify-app.yaml")
          OLD_CRAWLER_TAG=$(get_tag "crawler" "k8s/spotify-app.yaml")
          OLD_MONITORING_TAG=$(get_tag "spotify-monitoring" "k8s/monitoring-service.yaml")

          # Bước C: Ghi đè cấu hình infra từ main vào deploy, nhưng sẽ xử lý Tag sau
          cp /tmp/k8s-main/* k8s/
          
          # Bước D: Cập nhật Tag (Nếu build mới thì dùng TAG, nếu không thì dùng OLD_TAG)
          update_image() {
            local service=$1
            local new_tag=$2
            local old_tag=$3
            local file=$4
            local changed=$5
            
            if [ "$changed" == "true" ]; then
              echo "Updating $service to NEW tag: $new_tag"
              sed -i "s|image: registry.ntdevopsregistry.online/mlops/$service:.*|image: registry.ntdevopsregistry.online/mlops/$service:$new_tag|g" "$file"
            else
              echo "Preserving $service OLD tag: $old_tag"
              sed -i "s|image: registry.ntdevopsregistry.online/mlops/$service:.*|image: registry.ntdevopsregistry.online/mlops/$service:$old_tag|g" "$file"
            fi
          }

          update_image "backend" "$TAG" "$OLD_BACKEND_TAG" "k8s/spotify-app.yaml" "${{ needs.check-changes.outputs.backend }}"
          update_image "frontend" "$TAG" "$OLD_FRONTEND_TAG" "k8s/spotify-app.yaml" "${{ needs.check-changes.outputs.frontend }}"
          update_image "model-service" "$TAG" "$OLD_MODEL_TAG" "k8s/spotify-app.yaml" "${{ needs.check-changes.outputs.model }}"
          update_image "crawler" "$TAG" "$OLD_CRAWLER_TAG" "k8s/spotify-app.yaml" "${{ needs.check-changes.outputs.crawler }}"
          update_image "spotify-monitoring" "$TAG" "$OLD_MONITORING_TAG" "k8s/monitoring-service.yaml" "${{ needs.check-changes.outputs.monitoring_consumer }}"

          git add k8s/
          git commit -m "deploy: update manifests with tag preservation [skip ci]" || echo "No changes"
          git push origin HEAD:deploy --force
