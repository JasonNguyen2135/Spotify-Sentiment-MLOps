name: Manual Build and Deploy Model Service

on:
  workflow_dispatch:
    inputs:
      model_target:
        description: 'Model version (e.g., 5) or stage (Production, Staging)'
        required: true
        default: 'Production'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout main code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Login to Harbor
        run: echo "${{ secrets.HARBOR_PASSWORD }}" | docker login registry.ntdevopsregistry.io.vn -u ${{ secrets.HARBOR_USERNAME }} --password-stdin

      - name: Build and Push Model Service
        run: |
          TAG="${{ github.sha }}"
          docker build -t registry.ntdevopsregistry.io.vn/mlops/model-service:$TAG ./model
          docker push registry.ntdevopsregistry.io.vn/mlops/model-service:$TAG

      - name: Update Manifest (GitOps)
        run: |
          git config --global user.email "ci-bot@example.com"
          git config --global user.name "CI Bot Registry"
          TAG="${{ github.sha }}"
          MODEL_TARGET="${{ github.event.inputs.model_target }}"

          # 1. Save the new manifest structure from main
          mkdir -p /tmp/k8s-main
          cp k8s/spotify-app.yaml /tmp/k8s-main/

          # 2. Switch to deploy branch
          git fetch origin deploy
          git checkout deploy || git checkout -b deploy
          
          # 3. EXTRACT current running tags from deploy branch BEFORE overwriting
          get_tag() {
            grep -oP "image: registry.ntdevopsregistry.io.vn/mlops/$1:\K[^\s#]*" "k8s/spotify-app.yaml" | head -1 || echo "latest"
          }
          
          OLD_BACKEND_TAG=$(get_tag "backend")
          OLD_FRONTEND_TAG=$(get_tag "frontend")
          OLD_CRAWLER_TAG=$(get_tag "crawler")

          echo "Preserving tags: Backend=$OLD_BACKEND_TAG, Frontend=$OLD_FRONTEND_TAG, Crawler=$OLD_CRAWLER_TAG"
          
          # 4. Sync manifest structure from main
          cp /tmp/k8s-main/spotify-app.yaml k8s/
          
          # 5. Apply updates
          # Update Model Service Image Tag
          sed -i "s|image: registry.ntdevopsregistry.io.vn/mlops/model-service:.*|image: registry.ntdevopsregistry.io.vn/mlops/model-service:$TAG|g" k8s/spotify-app.yaml
          
          # Update MODEL_TARGET env var
          if grep -q "name: MODEL_TARGET" k8s/spotify-app.yaml; then
            # If exists, update the value in the next line
            sed -i "/name: MODEL_TARGET/,/value: .*/ s/value: .*/value: \"$MODEL_TARGET\"/" k8s/spotify-app.yaml
          else
            # If not exists, append it after the MLFLOW_TRACKING_URI block
            sed -i "/name: MLFLOW_TRACKING_URI/,/value: .*/ { /value: .*/ a\            - name: MODEL_TARGET\n              value: \"$MODEL_TARGET\"
            }" k8s/spotify-app.yaml
          fi

          # 6. Restore other service tags to what was running on deploy branch
          sed -i "s|image: registry.ntdevopsregistry.io.vn/mlops/backend:.*|image: registry.ntdevopsregistry.io.vn/mlops/backend:$OLD_BACKEND_TAG|g" k8s/spotify-app.yaml
          sed -i "s|image: registry.ntdevopsregistry.io.vn/mlops/frontend:.*|image: registry.ntdevopsregistry.io.vn/mlops/frontend:$OLD_FRONTEND_TAG|g" k8s/spotify-app.yaml
          sed -i "s|image: registry.ntdevopsregistry.io.vn/mlops/crawler:.*|image: registry.ntdevopsregistry.io.vn/mlops/crawler:$OLD_CRAWLER_TAG|g" k8s/spotify-app.yaml

          git add k8s/spotify-app.yaml
          git commit -m "deploy: manual model service image update to $TAG and target $MODEL_TARGET [skip ci]" || echo "No changes"
          git push origin HEAD:deploy --force

      - name: Slack Notification
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}
          SLACK_MESSAGE: "Manual Model Service Build/Deploy: ${{ job.status }}"
          SLACK_TITLE: "Application Update Status"
