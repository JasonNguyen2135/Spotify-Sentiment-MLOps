name: Manual Build and Deploy Model Service

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout main code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Login to Harbor
        run: echo "${{ secrets.HARBOR_PASSWORD }}" | docker login registry.ntdevopsregistry.online -u ${{ secrets.HARBOR_USERNAME }} --password-stdin

      - name: Build and Push Model Service
        run: |
          TAG="${{ github.sha }}"
          docker build -t registry.ntdevopsregistry.online/mlops/model-service:$TAG ./model
          docker push registry.ntdevopsregistry.online/mlops/model-service:$TAG

      - name: Update Manifest (GitOps)
        run: |
          git config --global user.email "ci-bot@example.com"
          git config --global user.name "CI Bot Registry"
          TAG="${{ github.sha }}"

          mkdir -p /tmp/k8s-main
          cp k8s/spotify-app.yaml /tmp/k8s-main/

          git fetch origin deploy
          git checkout deploy || git checkout -b deploy
          
          cp /tmp/k8s-main/spotify-app.yaml k8s/
          
          get_tag() {
            grep -oP "image: registry.ntdevopsregistry.online/mlops/$1:\K.*" "k8s/spotify-app.yaml" | head -1 || echo "latest"
          }
          
          OLD_BACKEND_TAG=$(get_tag "backend")
          OLD_FRONTEND_TAG=$(get_tag "frontend")
          OLD_CRAWLER_TAG=$(get_tag "crawler")
          
          sed -i "s|image: registry.ntdevopsregistry.online/mlops/model-service:.*|image: registry.ntdevopsregistry.online/mlops/model-service:$TAG|g" k8s/spotify-app.yaml
          
          sed -i "s|image: registry.ntdevopsregistry.online/mlops/backend:.*|image: registry.ntdevopsregistry.online/mlops/backend:$OLD_BACKEND_TAG|g" k8s/spotify-app.yaml
          sed -i "s|image: registry.ntdevopsregistry.online/mlops/frontend:.*|image: registry.ntdevopsregistry.online/mlops/frontend:$OLD_FRONTEND_TAG|g" k8s/spotify-app.yaml
          sed -i "s|image: registry.ntdevopsregistry.online/mlops/crawler:.*|image: registry.ntdevopsregistry.online/mlops/crawler:$OLD_CRAWLER_TAG|g" k8s/spotify-app.yaml

          git add k8s/spotify-app.yaml
          git commit -m "deploy: manual model service image update to $TAG [skip ci]" || echo "No changes"
          git push origin HEAD:deploy --force

      - name: Slack Notification
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}
          SLACK_MESSAGE: "Manual Model Service Build/Deploy: ${{ job.status }}"
          SLACK_TITLE: "Application Update Status"
