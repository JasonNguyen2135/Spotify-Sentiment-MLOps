name: Build and Push to Harbor

on:
  push:
    branches: [ "main" ] # Hoặc nhánh nào bạn đang dùng

jobs:
  build-and-push:
    runs-on: self-hosted # CHÍNH LÀ CON BOT ĐANG ĐỨNG ĐỢI KIA
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to Harbor
      run: |
        # Đăng nhập thẳng vào Harbor local bằng lệnh docker
        echo "${{ secrets.HARBOR_PASSWORD }}" | docker login 172.31.87.182 -u "${{ secrets.HARBOR_USERNAME }}" --password-stdin

    - name: Build Docker Image
      run: |
        docker build -t 172.31.87.182/spotify-mlops/sentiment-api:latest ./backend

    - name: Push to Harbor
      run: |
        docker push 172.31.87.182/spotify-mlops/sentiment-api:latest
