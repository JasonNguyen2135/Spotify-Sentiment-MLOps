name: Manual Trigger Airflow Training

on:
  workflow_dispatch:
    inputs:
      data_source:
        description: 'Đường dẫn file CSV dữ liệu mới (DagsHub URL hoặc Local Path)'
        required: false
        default: 'https://dagshub.com/davidmoi2135/Spotify-Sentiment-MLOps/raw/main/model/dataset/spotify_db.raw_reviews.csv'

jobs:
  trigger-airflow:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v3

      - name: 📦 Bơm file DAG trực tiếp vào cụm K8s (Deploy)
        run: |
          echo "🔍 Đang dò tìm tọa độ Pod Scheduler và Dag-Processor..."
          SCHEDULER_POD=$(kubectl get pods -n airflow -l component=scheduler -o jsonpath='{.items[0].metadata.name}')
          PROCESSOR_POD=$(kubectl get pods -n airflow -l component=dag-processor -o jsonpath='{.items[0].metadata.name}')
          
          echo "🚀 Bắt đầu bơm file spotify_training_dag.py vào hệ thống Airflow..."
          kubectl cp dags/spotify_training_dag.py airflow/$SCHEDULER_POD:/opt/airflow/dags/ -c scheduler
          kubectl cp dags/spotify_training_dag.py airflow/$PROCESSOR_POD:/opt/airflow/dags/ -c dag-processor
          sleep 5

      - name: Trigger Airflow DAG
        run: |
          echo "🚀 Kích hoạt Airflow Training Pipeline thủ công với data_source: ${{ github.event.inputs.data_source }}"
          kubectl exec -n airflow statefulset/airflow-scheduler -c scheduler -- airflow dags trigger spotify_sentiment_train_k3s_native -c "{\"data_source\": \"${{ github.event.inputs.data_source }}\"}"
