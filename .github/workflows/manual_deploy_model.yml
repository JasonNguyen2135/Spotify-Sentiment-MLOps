name: Manual Deploy Production Model

on:
  workflow_dispatch:

jobs:
  deploy-model:
    runs-on: self-hosted
    steps:
      - name: Refresh Model Service
        run: |
          echo "Initiating model service refresh for latest production version..."
          kubectl rollout restart deployment model-service -n mlops-sentiment
          
          echo "Verifying new pod status..."
          kubectl rollout status deployment model-service -n mlops-sentiment
          
          echo "Model deployment refresh sequence completed"

      - name: Slack Notification
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}
          SLACK_MESSAGE: "Manual Production Model Refresh: ${{ job.status }}"
          SLACK_TITLE: "Deployment Status"
