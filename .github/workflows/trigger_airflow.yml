name: CI/CD Pipeline - Spotify MLOps

# Luồng sẽ chạy tự động khi có code mới đẩy lên nhánh main
on:
  push:
    branches:
      - main
    paths:
      - 'model/train.py'                # Nhắm đúng vào file train.py trong thư mục model
      - 'model/dataset/**'              # Bắt mọi biến động file DVC hoặc CSV trong thư mục dataset
      - 'dags/spotify_training_dag.py'  # Giữ nguyên cấu hình DAG
  workflow_dispatch:

jobs:
  deploy-and-train:
    # Bắt buộc dùng runner cài trên WSL để có quyền gọi lệnh kubectl
    runs-on: self-hosted

    steps:
      - name: 📥 Kéo code từ GitHub về máy Runner
        uses: actions/checkout@v4

      - name: 📦 Bơm file DAG trực tiếp vào cụm K8s (Deploy)
        run: |
          echo "🔍 Đang dò tìm tọa độ Pod Scheduler và Dag-Processor..."
          SCHEDULER_POD=$(kubectl get pods -n airflow -l component=scheduler -o jsonpath='{.items[0].metadata.name}')
          PROCESSOR_POD=$(kubectl get pods -n airflow -l component=dag-processor -o jsonpath='{.items[0].metadata.name}')
          
          echo "🚀 Bắt đầu bơm file spotify_training_dag.py vào hệ thống Airflow..."
          # Lệnh cp lấy file từ thư mục dags/ vừa được checkout ném thẳng vào Pod
          kubectl cp dags/spotify_training_dag.py airflow/$SCHEDULER_POD:/opt/airflow/dags/
          kubectl cp dags/spotify_training_dag.py airflow/$PROCESSOR_POD:/opt/airflow/dags/
          
          echo "✅ Bơm file hoàn tất! Chờ 5 giây để Airflow parse file mới..."
          sleep 5

      - name: 🎯 Kích nổ Pod Train Model trên K8s (Trigger)
        run: |
          echo "💥 Bắn tín hiệu trigger DAG..."
          kubectl exec -i deployment/airflow-scheduler -n airflow -- airflow dags trigger spotify_sentiment_train_k3s_native -c "{\"commit_sha\": \"${{ github.sha }}\", \"message\": \"Auto-deployed and triggered by CI\"}"
          echo "✅ Kích hoạt thành công luồng huấn luyện MLOps!"
