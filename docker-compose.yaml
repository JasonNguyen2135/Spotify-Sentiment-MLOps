version: '3.8'

services:
  # --- 0. MESSAGE QUEUE ---
  redis:
    image: redis:alpine
    container_name: sentiment_redis
    ports:
      - "6379:6379"

  # --- 1. COLLECTOR POD (NEW) ---
  collector:
    build: ./collector
    container_name: sentiment_collector
    ports:
      - "8002:8000"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
    restart: always

  # --- 2. MONGODB ---
  mongodb:
    image: mongo:latest
    container_name: sentiment_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # --- 3. LABEL STUDIO ---
  label-studio:
    image: heartexlabs/label-studio:latest
    container_name: sentiment_label_studio
    ports:
      - "8086:8080"
    volumes:
      - label_data:/label-studio/data

  # --- 4. MODEL SERVICE ---
  model-service:
    build: ./model
    container_name: sentiment_model_api
    ports:
      - "8001:8000"
    env_file: 
      - .env
    restart: always

  # --- 5. BACKEND (ORCHESTRATOR + WORKER) ---
  backend:
    build: ./backend
    container_name: sentiment_backend
    ports:
      - "8000:8000"
    depends_on:
      - model-service
      - mongodb
      - redis
    environment:
      - MODEL_API_URL=http://model-service:8000 
      - MONGO_URL=mongodb://mongodb:27017
      - REDIS_HOST=redis
    restart: always

  # --- 6. FRONTEND ---
  frontend:
    build: ./frontend
    container_name: sentiment_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - BACKEND_API_URL=http://backend:8000
    restart: always

  # --- 7. CRAWLER ---
  crawler:
    build: ./crawler
    container_name: sentiment_crawler
    depends_on:
      - mongodb
    environment:
      - MONGO_URL=mongodb://mongodb:27017
    restart: always

volumes:
  db_data:
  mongo_data:
  label_data:
